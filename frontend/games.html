<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            min-height: 100vh;
        }

        nav {
            background: #1a1a2e;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d44;
        }

        nav h1 { color: #818cf8; font-size: 20px; }

        nav button {
            background: transparent;
            border: 1px solid #6366f1;
            color: #818cf8;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        nav button:hover { background: #6366f1; color: white; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 24px; }

        .add-game {
            background: #1a1a2e;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
            border: 1px solid #2d2d44;
        }

        .add-game h2 { margin-bottom: 16px; font-size: 16px; color: #818cf8; }

        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }

        input, select {
            flex: 1;
            min-width: 140px;
            padding: 10px 14px;
            background: #0f0f1a;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus { border-color: #818cf8; }

        select option { background: #1a1a2e; }

        .add-btn {
            padding: 10px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover { background: #4f46e5; }


        .filter-btn {
            padding: 6px 16px; 
            background:#1a1a2e;
            color: white; 
            border: none;
            border-radius: 20px; 
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        } 
          .filter-btn:hover { background: #4f46e5; }

          .active {
            background: #4f46e5;
          }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .game-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d2d44;
            transition: border-color 0.2s;
        }

        .game-card:hover { border-color: #6366f1; }

        .game-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

        .game-meta { font-size: 13px; color: #6b7280; margin-bottom: 12px; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .PLAYING { background: #1d4ed8; color: #93c5fd; }
        .COMPLETED { background: #065f46; color: #6ee7b7; }
        .DROPPED { background: #7f1d1d; color: #fca5a5; }
        .PLANNED { background: #4b5563; color: #d1d5db; }

        .empty {
            text-align: center;
            color: #6b7280;
            padding: 60px 0;
            font-size: 15px;
        }
        .star {
            opacity: 0.3;
            cursor: pointer;
            font-size: 20px;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Game Library</h1>
        <div>
            <button onclick="window.location.href='profile.html'">Profile</button>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="add-game">
            <h2>+ Add Game</h2>
            <div class="form-row">
                <input type="text" id="gameTitle" placeholder="Game title" />
                <input type="text" id="gameGenre" placeholder="Genre" />
                <input type="text" id="gamePlatform" placeholder="Platform" />
                <input type="number" id="gameYear" placeholder="Year" />
                <select id="gameStatus">
                    <option value="PLANNED">Planned</option>
                    <option value="PLAYING">Playing</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="DROPPED">Dropped</option>
                </select>
                <button class="add-btn" onclick="addGame()">Add</button>
            </div>
        </div>
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button id="filter-ALL" class="filter-btn" onclick="filterGames('ALL')" >All</button>
            <button id="filter-PLANNED" class="filter-btn" onclick="filterGames('PLANNED')">Planned</button>
            <button id="filter-PLAYING" class="filter-btn" onclick="filterGames('PLAYING')">Playing</button>
            <button id="filter-DROPPED" class="filter-btn" onclick="filterGames('DROPPED')">Dropped</button>
            <button id="filter-COMPLETED" class="filter-btn" onclick="filterGames('COMPLETED')">Completed</button>
        </div>
        
        <div class="games-grid" id="gamesGrid">
            <div class="empty">Loading your games...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        const API = 'http://127.0.0.1:8080';
        let currentUser = null;

        let selectedRating = 0;

        async function fetchWithAuth(url, options = {}) {
            return fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
        }

        async function loadGames() {
            const res = await fetchWithAuth(`${API}/api/entries`);
            const entries = await res.json();
            const grid = document.getElementById('gamesGrid');

            if (entries.length === 0) {
                grid.innerHTML = '<div class="empty">No games yet. Add your first game!</div>';
                return;
            }

    // Загружаем рецензии для каждой игры
            const entriesWithRatings = await Promise.all(entries.map(async entry => {
                const revRes = await fetchWithAuth(`${API}/api/reviews/game/${entry.game.id}`);
                const reviews = await revRes.json();
                const avg = reviews.length > 0 
                    ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
                    : null;
                return { ...entry, avgRating: avg };
            }));
            allEntries = entriesWithRatings;
                grid.innerHTML = entriesWithRatings.map(entry => `
                <div class="game-card" onclick="openSidebar(${JSON.stringify(entry).replace(/"/g, '&quot;')})" style="cursor:pointer">
                    <div class="game-title">${entry.game.title}</div>
                    <div class="game-meta">${entry.game.genre} • ${entry.game.platform} • ${entry.game.releaseYear}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
                        <span class="status-badge ${entry.status}">${entry.status}</span>
                        <div style="display:flex; align-items:center; gap:8px">
                            ${entry.avgRating ? `<span style="color:#f59e0b; font-size:13px">⭐ ${entry.avgRating}</span>` : ''}
                            <button onclick="event.stopPropagation(); deleteGame('${entry.id}')" style="background:transparent; border:1px solid #7f1d1d; color:#fca5a5; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterGames(status) {
            const filtered = status === 'ALL' ? allEntries : allEntries.filter(entry => entry.status === status);
            
            const grid = document.getElementById('gamesGrid');

            const filterButtons = document.querySelectorAll('.filter-btn');

            filterButtons.forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${status}`).classList.add('active');


            grid.innerHTML = filtered.map(entry => 
                `<div class="game-card" onclick="openSidebar(${JSON.stringify(entry).replace(/"/g, '&quot;')})" style="cursor:pointer">
                    <div class="game-title">${entry.game.title}</div>
                    <div class="game-meta">${entry.game.genre} • ${entry.game.platform} • ${entry.game.releaseYear}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
                        <span class="status-badge ${entry.status}">${entry.status}</span>
                        <div style="display:flex; align-items:center; gap:8px">
                            ${entry.avgRating ? `<span style="color:#f59e0b; font-size:13px">⭐ ${entry.avgRating}</span>` : ''}
                            <button onclick="event.stopPropagation(); deleteGame('${entry.id}')" style="background:transparent; border:1px solid #7f1d1d; color:#fca5a5; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addGame() {
            const title = document.getElementById('gameTitle').value;
            const genre = document.getElementById('gameGenre').value;
            const platform = document.getElementById('gamePlatform').value;
            const releaseYear = document.getElementById('gameYear').value;
            const status = document.getElementById('gameStatus').value;

            if (!title) return alert('Please enter a game title');

            // 1. Сначала создаём игру
            const gameRes = await fetchWithAuth(`${API}/api/games`, {
                method: 'POST',
                body: JSON.stringify({ title, genre, platform, releaseYear: parseInt(releaseYear), coverUrl: '' })
            });
            
            if(!gameRes.ok) {
                const error = await gameRes.json();
                alert("Error: " + Object.values(error).join(", "));
                return;
            }

            const game = await gameRes.json();

            // 2. Получаем пользователей
            const usersRes = await fetchWithAuth(`${API}/api/users/me`);
            const user = await usersRes.json();

            // 3. Создаём запись в коллекции
            await fetchWithAuth(`${API}/api/entries`, {
                method: 'POST',
                body: JSON.stringify({ game: { id: game.id }, user: { id: user.id }, status })
            });

            // Очищаем поля
            document.getElementById('gameTitle').value = '';
            document.getElementById('gameGenre').value = '';
            document.getElementById('gamePlatform').value = '';
            document.getElementById('gameYear').value = '';

            loadGames();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        loadGames();

        async function deleteGame(id) {
            await fetchWithAuth(`${API}/api/entries/${id}`, {
                method: 'DELETE'
            });
            loadGames();
        }

        let selectedGameId = null;
        let selectedEntryId = null;

        let allEntries = null;

        function openSidebar(entry) {
            selectedGameId = entry.game.id;
            selectedEntryId = entry.id;
            
            document.getElementById('sidebar-title').textContent = entry.game.title;
            document.getElementById('sidebar-meta').textContent = 
                `${entry.game.genre} • ${entry.game.platform} • ${entry.game.releaseYear}`;
            document.getElementById('sidebar-status').innerHTML = 
                `<span class = "status-badge ${entry.status}">${entry.status}</span>`;
            loadReviews(entry.game.id);
            document.getElementById('sidebar').style.transform = 'translateX(0)';
            document.getElementById('overlay').style.display = 'block'; 
            document.getElementById('status-select').value = entry.status;
        }

        function closeSidebar(){
            document.getElementById('sidebar').style.transform = 'translateX(100%)';
            document.getElementById('overlay').style.display = 'none';
            selectedGameId = null;
        }

        async function loadReviews(gameId) {
            const res = await fetchWithAuth(`${API}/api/reviews/game/${gameId}`);
            const reviews = await res.json();
            const container = document.getElementById('sidebar-reviews');

            if (reviews.length === 0) {
                container.innerHTML = '<p style="color: #6b7280; font-size:14px">No reviews yet</p>';
                return;
            }

            container.innerHTML = reviews.map(review => `
            <div style="background:#0f0f1a; border-radius:8px; padding:12px; margin-bottom: 12px; border:1px solid #2d2d44">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                    <span style="color:#818cf8; font-size:13px">${review.user.username}</span>
                    <span style="color:#f59e0b; font-size:13px">⭐ ${review.rating}/10</span>
                </div>
                <p style ="color:#d1d5db; font-size:13px; margin:0">${review.text}</p>
            </div>
            `).join('');
        }

        async function submitReview() {
            const rating = selectedRating;
            const text = document.getElementById('review-text').value;

            if(!rating || !text) {
                alert('Fill in rating and review text!');
                return;
            }

            const userRes = await fetchWithAuth(`${API}/api/users/me`);
            const user = await userRes.json();

            const res = await fetchWithAuth(`${API}/api/reviews`, {
                method: 'POST',
                body: JSON.stringify({
                    user: {id:user.id},
                    game: {id:selectedGameId},
                    rating: parseInt(rating),
                    text: text
                })
            });

            if(res.ok) {
        
                document.getElementById('review-text').value = '';
                loadReviews(selectedGameId);
            } else {
                const error = await res.json();
                alert('Error: ' + Object.values(error).join(', '));
            }
        }

        async function updateStatus(newStatus) {
            const entryId = selectedEntryId;
            await fetchWithAuth(`${API}/api/entries/${entryId}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: newStatus })
            });
            loadGames();
        }

        function setRating(rating){
            selectedRating = rating;
            const allStars = document.querySelectorAll('.star');
            allStars.forEach(star => 
                {
                    if (star.dataset.value <= rating){
                        star.style.opacity = '1';
                    } else {
                        star.style.opacity = '0.3';
                    }
                }
            )
        }
    </script>

    <div id="overlay" onclick="closeSidebar()" style="
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 99;
    "></div>

    <div id="sidebar" style="
    position: fixed;
    top: 0; right: 0;
    width: 400px; height: 100%;
    background: #1a1a2e;
    border-left: 1px solid #2d2d44;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    padding: 24px;
    ">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 id="sidebar-title" style="color: #818cf8; font-size: 18px;"></h2>
        <button onclick="closeSidebar()" style="background: transparent; border: none; color: #6b7280; font-size: 20px; cursor: pointer">✕</button>
    </div>

    <div id="sidebar-meta" style="color: #6b7280; font-size: 14px; margin-bottom: 16px;"></div>

    <div id="sidebar-status" style="margin-bottom: 24px;"></div>
    <select id="status-select" onchange="updateStatus(this.value)" style="
        width: 100%;
        padding: 10px;
        background: #0f0f1a;
        border: 1px solid #2d2d44;
        border-radius: 8px;
        color: #ffffff;
        font-size: 14px;
        margin-bottom: 16px;
    ">
        <option value="PLANNED">Planned</option>
        <option value="PLAYING">Playing</option>
        <option value="COMPLETED">Completed</option>
        <option value="DROPPED">Dropped</option>
    </select>

    <hr style="border-color: #2d2d44; margin-bottom: 24px;">

    <h3 style="color: #ffffff; font-size: 15px; margin-bottom: 16px;">Review</h3>
    <div id="sidebar-reviews"></div>

    <hr style="border-color: #2d2d44; margin: 24px 0;">

    <h3 style="color: #ffffff; font-size: 15px; margin-bottom: 16px;">Add Review</h3>
    
    <!--<input type="number" id="review-rating" placeholder="Rating 1-10" min="1" max="10" style="width: 100%; margin-bottom: 10px; padding: 10px; background: #0f0f1a; border: 1px solid #2d2d44; border-radius: 8px; color: #fff;"/>-->
    

    <div style="margin-bottom: 20px;">
        <span class="star" data-value="1" onclick="setRating(1)">⭐</span>
        <span class="star" data-value="2" onclick="setRating(2)">⭐</span>
        <span class="star" data-value="3" onclick="setRating(3)">⭐</span>
        <span class="star" data-value="4" onclick="setRating(4)">⭐</span>
        <span class="star" data-value="5" onclick="setRating(5)">⭐</span>
        <span class="star" data-value="6" onclick="setRating(6)">⭐</span>
        <span class="star" data-value="7" onclick="setRating(7)">⭐</span>
        <span class="star" data-value="8" onclick="setRating(8)">⭐</span>
        <span class="star" data-value="9" onclick="setRating(9)">⭐</span>
        <span class="star" data-value="10" onclick="setRating(10)">⭐</span>
    </div>

    <textarea id="review-text" placeholder="Write review..." style="width: 100%; height:100px; margin-left: 0px; margin-bottom: 8px; padding: 10px; background: #0f0f1a; border: 1px solid #2d2d44; border-radius: 8px; color: #fff; resize: none;"></textarea>

    <button onclick="submitReview()" style="width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">Send</button>
    </div>
</body>
</html>
