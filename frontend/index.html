<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
            color: #818cf8;
        }

        p.subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: #0f0f1a;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #818cf8; }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #4f46e5; }

        .toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }

        .toggle span {
            color: #818cf8;
            cursor: pointer;
        }

        .toggle span:hover { text-decoration: underline; }

        .message {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
        }

        .error { color: #f87171; }
        .success { color: #34d399; }


        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.4s ease;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .input-wrapper input{
            margin-bottom: 0;
            padding-left: 40px;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
    <div class="card">
        <h1>Game Library</h1>
        <p class="subtitle" id="formSubtitle">Sign in to your account</p>
        <div class="input-wrapper">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Username" />
        </div>
        <div class="input-wrapper" id="emailWrapper" style="display: none;">
            <span class="icon">✉️</span>
            <input type="email" id="email" placeholder="Email" />
        </div>
        <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Password" />
        </div>

        <button id="submitBtn" onclick="handleSubmit()">Login</button>

        <div class="message" id="message"></div>

        <div class="toggle">
            <span id="toggleText">Don't have an account?
                <span onclick="toggleForm()">Register</span>
            </span>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('emailWrapper').style.display = isLogin ? 'none' : 'block';
            document.getElementById('formSubtitle').textContent = isLogin ? 'Sign in to your account' : 'Create a new account';
            document.getElementById('submitBtn').textContent = isLogin ? 'Login' : 'Register';
            document.getElementById('toggleText').innerHTML = isLogin
                ? "Don't have an account? <span onclick='toggleForm()'>Register</span>"
                : "Already have an account? <span onclick='toggleForm()'>Login</span>";
            document.getElementById('message').textContent = '';
        }

        async function handleSubmit() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const msg = document.getElementById('message');

            if (!username || !password) {
                msg.textContent = 'Please fill in all fields';
                msg.className = 'message error';
                return;
            }

            const url = isLogin
                ? 'http://127.0.0.1:8080/api/auth/login'
                : 'http://127.0.0.1:8080/api/auth/register';

            const body = isLogin
                ? { username, password }
                : { username, email, password };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        localStorage.setItem('token', data.token);
                        msg.textContent = 'Login successful! Redirecting...';
                        msg.className = 'message success';
                        setTimeout(() => window.location.href = 'http://127.0.0.1:5500/frontend/games.html', 1000);
                    } else {
                        msg.textContent = 'Registered! You can now login.';
                        msg.className = 'message success';
                        setTimeout(() => toggleForm(), 1500);
                    }
                } else {
                    const errorMsg = data.message || Object.values(data).join(', ') || 'Something went wrong.';
                    msg.textContent = errorMsg;
                    msg.className = 'message error';
                }
            } catch (e) {
                msg.textContent = 'Cannot connect to server.';
                msg.className = 'message error';
            }
        }
    </script>
</body>
</html>
