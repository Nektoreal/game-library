<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <div id="progress-bar"></div>
    <nav>

        <h1>Game Library</h1>

        <div>
            <button onclick="window.location.href = 'games.html'">Games</button>
            <button onclick="logout()">Logout</button>
        </div>
        
    </nav>
    

    <div class="container">
        <div id="profile-avatar" style="width: 100px; height: 100px; border-radius: 25%; background: #6366f1; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-wrap: wrap;">
          P
        </div>

        <div id="profile-username" style="font-size: 24px; font-weight: 600; margin-top: 16px;">username</div>
        <div id="profile-email" style="font-size: 14px; color: #6b7280; margin-top: 4px;">email</div>

        <div style="display: flex; gap: 16px; margin-top: 32px;">

            <div style="background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d44;     text-align: center; min-width: 120px;">
                <div id="count-total" style="font-size: 32px; font-weight: 600; color: #818cf8;">0</div>
                <div style="font-size: 13px; color: #6b7280; margin-top: 4px;">Total</div>
            </div>

          <!--Playing-->
          <div style="background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d44; text-align: center;min-width: 120px;">
            <div id="count-playing" style="font-size: 32px; font-weight: 600; color: #93c5fd;">0</div>
            <div style="font-size: 13px; color: #6b7280; margin-top: 4px;">Playing</div>
          </div>
          <!--Dropped-->
          <div style="background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d44; text-align: center;min-width: 120px;">
            <div id="count-dropped" style="font-size: 32px; font-weight: 600; color: #93c5fd;">0</div>
            <div style="font-size: 13px; color: #6b7280; margin-top: 4px;">Dropped</div>
          </div>
          <!--Planned-->
          <div style="background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d44; text-align: center;min-width: 120px;">
            <div id="count-planned" style="font-size: 32px; font-weight: 600; color: #93c5fd;">0</div>
            <div style="font-size: 13px; color: #6b7280; margin-top: 4px;">Planned</div>
          </div>
          <!--Completed-->
          <div style="background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d44; text-align: center; min-width: 120px;">
            <div id="count-completed" style="font-size: 32px; font-weight: 600; color: #93c5fd;">0</div>
            <div style="font-size: 13px; color: #6b7280; margin-top: 4px;">Completed</div>
          </div>
          
        </div>

        <!-- Средняя оценка и дата регистрации -->
        <div style="display:flex; gap:16px; margin-top:24px;">
            <div style="background:#1a1a2e; padding:20px; border-radius:12px; border:1px solid #2d2d44; text-align:center; min-width:120px;">
                <div id="avg-rating" style="font-size:32px; font-weight:600; color:#f59e0b;">—</div>
                <div style="font-size:13px; color:#6b7280; margin-top:4px;">Avg Rating</div>
            </div>
            <div style="background:#1a1a2e; padding:20px; border-radius:12px; border:1px solid #2d2d44; text-align:center; min-width:120px;">
                <div style="font-size:13px; color:#6b7280; margin-top:1px;">Member since</div>
                <div id="member-since" style="font-size:20px; font-weight:600; color:#818cf8; margin: top 5px;">—</div>
            </div>
        </div>

        <!-- Топ жанры -->
        <div style="background:#1a1a2e; padding:20px; border-radius:12px; border:1px solid #2d2d44; margin-top:24px;">
            <h3 style="font-size:15px; color:#818cf8; margin-bottom:16px;">Top Genres</h3>
            <div id="top-genres"></div>
        </div>

        <!-- Последние рецензии -->
        <div style="background:#1a1a2e; padding:20px; border-radius:12px; border:1px solid #2d2d44; margin-top:24px;">
            <h3 style="font-size:15px; color:#818cf8; margin-bottom:16px;">Recent Reviews</h3>
            <div id="last-reviews"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
